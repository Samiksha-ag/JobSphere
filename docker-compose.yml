version: '3.8'

services:
  # Backend Service
  backend:
    build: ./job-backend
    container_name: jobsphere-backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - AI_SERVICE_URL=http://job-ai:8000
    volumes:
      - ./job-backend:/app
      - /app/node_modules
    depends_on:
      - job-ai
    restart: always

  # Python Recommendation Service
  job-ai:
    build: ./job-ai
    container_name: jobsphere-ai
    ports:
      - "8000:8000"
    restart: always

  # Frontend Service
  frontend:
    build: ./job-frontend
    container_name: jobsphere-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./job-frontend:/app
      - /app/node_modules
    restart: always